      background: #1a1a1a; color: #f0f0f0;
      border: 2px solid #2a2a2a; border-radius: 8px;
      font-size: 1.2rem; font-family: 'Courier New', monospace;
      line-height: 1.6; padding: 1.2rem; resize: vertical;
      outline: none; transition: border-color 0.2s;
    }
    #wod-input:focus { border-color: #555; }
    #wod-input::placeholder { color: #333; }
    .editor-btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 1.1rem 2.4rem; font-size: 1.15rem; font-weight: 700;
      font-family: 'Arial Black', Arial, sans-serif;
      text-transform: uppercase; letter-spacing: 0.04em;
      cursor: pointer; border: none; border-radius: 6px;
      background: #111; color: #fff;
      transition: transform 0.1s, filter 0.15s;
    }
    button:hover  { filter: brightness(1.3); }
    button:active { transform: scale(0.97); }

    /* Móvil: logo más grande relativo a la pantalla, botones compactos */
    @media (max-width: 600px) {
      #brand-logo { max-width: 170px; width: 42vw; }
      #screen-editor p { font-size: 0.95rem; max-width: 88vw; }
      #wod-input { width: 88vw; }
      .editor-btns { flex-direction: column; width: 88vw; gap: 0.6rem; }
      button { font-size: 0.85rem; padding: 0.8rem 1rem; width: 100%; letter-spacing: 0.01em; }
      #btn-back {
        opacity: 1; color: #fff; background: rgba(255,255,255,0.28);
        font-size: 1.2rem; padding: 0.75rem 1.5rem; bottom: 1.2rem; right: 1.2rem;
        border-radius: 8px; font-weight: 700;
      }
      #display-hint { display: none; } /* "Esc volver" no aplica en móvil */
    }

    /* ════════════════════════════════
       PANTALLA DISPLAY
    ════════════════════════════════ */
    #screen-display {
      position: fixed; inset: 0;
      display: none; align-items: center; justify-content: center;
      background: #000; overflow: hidden;
      z-index: 2;
    }

    /* Marco con la proporción real de un TV (16:9), centrado y
       "letterboxed" dentro de la pantalla disponible — así en un
       móvil en vertical se ve una previsualización fiel a escala de
       cómo quedaría en la TV, sin necesidad de girar el teléfono. */
    #tv-frame {
      width:  min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      display: flex; flex-direction: column;
      padding: 1.5vh 2vw 0;
      position: relative; overflow: hidden;
    }

    /* Cabecera fija — tamaños en vw, no escala con el scaler */
    #wod-header {
      flex-shrink: 0;
      text-align: center;
      padding-bottom: 0.5vh;
    }
    #wod-header .title {
      font-size: clamp(20px, 4.5vw, 90px);
      font-weight: 900; color: #fff;
      text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.1;
    }
    #wod-header .subtitle {
      font-size: clamp(14px, 2.7vw, 54px);
      font-weight: 400; color: rgba(255,255,255,0.6); line-height: 1.15;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    /* Wrapper del grid — ocupa el espacio restante (flex:1) */
    #wod-content {
      flex: 1;
      min-height: 0;
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    /* Grid de secciones — SIN flex:1 para que scrollHeight refleje el tamaño real */
    #wod-grid {
      display: grid;
      width: 100%;
      gap: 0.6em;
      text-transform: uppercase;
      /* height y alignContent los controla el scaler */
    }

    /* Tarjeta de sección */
    .wod-card {
      padding: 0.25em 0.5em 0.3em;
      min-width: 0;  /* evita que la columna se expanda con texto nowrap */
      min-height: 0; /* evita que la fila se expanda con el contenido */
      overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-start;
    }
    .card-num {
      font-size: 0.85em; font-weight: 400;
      color: rgba(255,255,255,0.35);
      line-height: 1.1; margin-bottom: 0.08em;
      letter-spacing: 0.05em;
      white-space: normal;
    }
    .card-title {
      font-size: 1.9em; font-weight: 900;
      color: #fff;
      line-height: 1.05; margin-bottom: 0.08em;
      letter-spacing: 0.01em;
      white-space: normal;
    }
    .wod-line {
      font-size: 1em; font-weight: 500;
      color: #fff; line-height: 1.35;
      white-space: normal;
    }
    .wod-note {
      font-size: 0.88em; font-style: italic;
      color: rgba(255,255,255,0.45); line-height: 1.15;
      white-space: normal;
    }
    strong { color: #fff; font-weight: 900; }
    #wod-grid strong { font-size: 1.2em; font-weight: 900; }

    /* Botón volver */
    #btn-back {
      position: fixed; bottom: 0.5rem; right: 0.7rem;
      background: rgba(255,255,255,0.06); color: #444;
      font-size: 0.65rem; padding: 0.25rem 0.6rem;
      border-radius: 3px; opacity: 0.3; transition: opacity 0.2s;
      text-transform: none; letter-spacing: 0;
      font-family: Arial, sans-serif; font-weight: 400; z-index: 20;
    }
    #btn-back:hover { opacity: 1; color: #ccc; }

    #btn-fs-display {
      position: fixed; bottom: 1.2rem; left: 1.2rem;
      background: rgba(255,255,255,0.22); color: #fff;
      font-size: 1.2rem; padding: 0.75rem 1.5rem;
      border-radius: 8px; font-weight: 700;
      font-family: Arial, sans-serif; z-index: 20;
      text-transform: none; letter-spacing: 0;
    }
    #btn-fs-display:hover { background: rgba(255,255,255,0.35); }

    @media (max-width: 600px) {
      #btn-back {
        opacity: 1; color: #fff; font-weight: 700;
        font-size: 1.2rem; padding: 0.75rem 1.5rem;
        bottom: 1.2rem; right: 1.2rem;
        background: rgba(255,255,255,0.22); border-radius: 8px;
        width: auto;
      }
    }

    #display-hint {
      display: none !important;
      position: fixed; bottom: 0.5rem; left: 0.7rem;
      color: #1c1c1c; font-size: 0.6rem;
      font-family: Arial, sans-serif; pointer-events: none;
    }

    /* ════ Botones secundarios del editor ════ */
    #btn-share { display: none; } /* solo visible en HTTP */

    /* ════ Modal Chromecast ════ */
    #cast-modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.88);
      display: none; align-items: center; justify-content: center;
    }
    #cast-panel {
      background: #111; border: 1px solid #2a2a2a;
      border-radius: 10px; padding: 2rem 2.2rem 1.6rem;
      max-width: 400px; width: 92%; text-align: center;
    }
    .cast-title {
      font-size: 0.95rem; font-weight: 900; color: #fff;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 1.4rem;
    }
    .cast-steps { text-align: left; margin-bottom: 1.4rem; }
    .cast-step {
      display: flex; gap: 0.8rem; align-items: flex-start;
      margin-bottom: 0.9rem;
    }
    .cast-n {
      background: #fff; color: #000; border-radius: 50%;
      min-width: 1.35rem; height: 1.35rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 900; flex-shrink: 0;
      margin-top: 0.1rem;
    }
    .cast-text {
      font-size: 0.82rem; color: #999;
      font-family: Arial, sans-serif; line-height: 1.55;
    }
    .cast-text strong { color: #fff; font-family: 'Arial Black', Arial, sans-serif; }
    .cast-text code {
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 3px; padding: 0.05em 0.35em;
      font-family: monospace; font-size: 0.9em; color: #ccc;
    }
    .cast-note {
      font-size: 0.72rem; color: #666; font-family: Arial, sans-serif;
      line-height: 1.5; text-align: left; margin-bottom: 1.4rem;
      border-top: 1px solid #2a2a2a; padding-top: 0.9rem;
    }
    .cast-share-box {
      background: rgba(255,255,255,0.07); border-radius: 10px;
      padding: 1rem 1rem 0.8rem; margin-bottom: 1.2rem; text-align: center;
    }
    .cast-share-label {
      font-size: 0.7rem; color: #888; font-family: Arial, sans-serif;
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.7rem;
    }
    .cast-share-sub {
      font-size: 0.7rem; color: #666; font-family: Arial, sans-serif;
      line-height: 1.45; margin-top: 0.6rem;
    }
    #btn-share-wod {
      width: 100%; background: #fff; color: #000;
      font-size: 0.95rem; padding: 0.65rem 1rem;
      border-radius: 8px; border: none; cursor: pointer;
      font-weight: 900; letter-spacing: 0.02em;
      font-family: 'Arial Black', Arial, sans-serif;
    }
    #btn-cast-close {
      background: #1a1a1a; color: #666; border: 1px solid #2a2a2a;
      font-size: 0.8rem; padding: 0.55rem 1.4rem;
    }
    #btn-cast-close:hover { color: #ccc; }

    /* ════ Pantalla de espera TV ════ */
    #screen-tv-wait {
      display: none; position: fixed; inset: 0;
      background: #000; flex-direction: column;
      align-items: center; justify-content: center; z-index: 5; gap: 1.2rem;
    }
    #tv-logo { width: 130px; opacity: 0.6; }
    #tv-qr { width: 230px; height: 230px; border-radius: 6px; }
    #tv-wait-label {
      color: #888; font-family: 'Arial Black', Arial, sans-serif;
      font-size: 0.95rem; letter-spacing: 0.15em; text-transform: uppercase;
    }
    #tv-wait-sub {
      color: #2a2a2a; font-family: Arial, sans-serif;
      font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    }
    #btn-tv-fs {
      margin-top: 0.6rem; background: #1a1a1a; color: #555;
      border: 1px solid #2a2a2a; border-radius: 8px;
      font-size: 0.9rem; padding: 0.6rem 1.4rem; cursor: pointer;
      font-family: Arial, sans-serif;
    }
    #btn-tv-fs:hover { color: #ccc; border-color: #555; }

    /* ════ Pantalla enviar WOD (móvil tras escanear) ════ */
    #screen-send {
      display: none; position: fixed; inset: 0;
      background: #111; flex-direction: column;
      align-items: center; padding: 2rem 1.5rem; box-sizing: border-box; z-index: 10;
    }
    #send-logo { width: 90px; margin-bottom: 1.2rem; }
    #send-input {
      width: 100%; flex: 1; background: #1a1a1a; color: #fff;
      border: 1px solid #333; border-radius: 10px; padding: 1rem;
      font-size: 1rem; resize: none; margin-bottom: 1rem;
      font-family: Arial, sans-serif; box-sizing: border-box;
    }
    #btn-send-wod {
      width: 100%; background: #fff; color: #000;
      font-size: 1.1rem; font-weight: 900; padding: 1rem;
      border: none; border-radius: 10px; cursor: pointer;
      font-family: 'Arial Black', Arial, sans-serif; letter-spacing: 0.04em;
    }
    #send-status {
      margin-top: 0.8rem; color: #666; font-family: Arial, sans-serif;
      font-size: 0.85rem; text-align: center; min-height: 1.2em;
    }

    /* ════ Pantalla de elección ════ */
    #screen-choice {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.4rem; z-index: 30;
    }
    #choice-logo { width: 160px; margin-bottom: 0.8rem; }
    .choice-btn {
      width: 300px; padding: 1.5rem 1rem; border: none;
      border-radius: 14px; cursor: pointer;
      font-family: 'Arial Black', Arial, sans-serif;
      font-size: 1.25rem; font-weight: 900; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #btn-choice-tv   { background: #fff; color: #000; }
    #btn-choice-phone { background: #1a1a1a; color: #fff; border: 2px solid #333; }
  </style>
</head>

    <img id="send-logo" src="" alt="Olympo Box">
    <textarea id="send-input" placeholder="Pega el WOD aquí..."></textarea>
    <button id="btn-send-wod">📺 Enviar al TV</button>

  </div>

  <!-- Modal: instrucciones Chromecast -->
  <div id="cast-modal">
    <div id="cast-panel">
      <div class="cast-title">Transmitir al TV</div>
      <div class="cast-steps" id="cast-steps"></div>
      <div class="cast-note" id="cast-note"></div>
      <button id="btn-cast-close">Entendido</button>
    </div>
  </div>

  <script>

    /* ─── Canal TV en tiempo real ─── */
    const NTFY_TOPIC = 'olimpobox-wod-7f3k';
    const NTFY_URL   = 'https://ntfy.sh/' + NTFY_TOPIC;

    function sendToTV(raw) {
      fetch(NTFY_URL, { method: 'POST', body: raw }).catch(() => {});
    }

    function startTVMode() {
      const logoSrc = document.getElementById('brand-logo').src;
      document.getElementById('tv-logo').src = logoSrc;
      const sendURL = location.origin + location.pathname + '#send';
      document.getElementById('tv-qr').src =
        'https://api.qrserver.com/v1/create-qr-code/?size=260x260&color=ffffff&bgcolor=000000&data=' +
        encodeURIComponent(sendURL);
      document.getElementById('screen-choice').style.display = 'none';
      document.getElementById('screen-editor').style.display = 'none';
      document.getElementById('screen-tv-wait').style.display = 'flex';
      // Solo escuchar mensajes nuevos — no cargar historial para evitar datos antiguos
      const es = new EventSource(NTFY_URL + '/sse');
      es.addEventListener('message', e => {
        try { const m = JSON.parse(e.data).message; if (m) showTVWOD(m); } catch(e) {}
      });
    }

    function startSendMode() {
      document.getElementById('send-logo').src = document.getElementById('brand-logo').src;
      document.getElementById('screen-editor').style.display = 'none';
      document.getElementById('screen-send').style.display = 'flex';
      document.getElementById('btn-send-wod').addEventListener('click', () => {
        const raw = document.getElementById('send-input').value;
        if (!raw.trim()) return;
        sendToTV(raw);
        const btn = document.getElementById('btn-send-wod');
        btn.textContent = '✓ WOD enviado';
        btn.style.cssText += 'background:#4caf50;color:#fff;';
        document.getElementById('send-status').textContent = 'El WOD ya está en la TV.';
      });
    }

    function showTVWOD(raw) {
      document.getElementById('screen-tv-wait').style.display = 'none';
      renderWOD(raw);
      document.getElementById('screen-display').style.display = 'flex';
      setTimeout(scaleWOD, 100);
    }

    /* ─── Codificación WOD en URL ─── */
    function encodeWOD(text) {
      return btoa(unescape(encodeURIComponent(text)));
    }
    function decodeWOD(b64) {
      try { return decodeURIComponent(escape(atob(b64))); } catch(e) { return null; }
    }
    function wodURL(raw) {
      return location.origin + location.pathname + '#wod=' + encodeWOD(raw);
    }

    /* ─── Utilidades ─── */
    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Convierte texto con marcadores **bold** en HTML con <strong>
    // Sin marcadores: bold automático en números. Con marcadores: procesa secciones.
    function applyBold(text) {
      if (!text.includes('**')) {
        return esc(text).replace(/\b(\d+(?:[.,]\d+)?)\b/g, '<strong>$1</strong>');
      }
      const parts = text.split(/(\*\*[^*\n]+\*\*)/);
      return parts.map(p => {
        if (p.startsWith('**') && p.endsWith('**')) {
          return `<strong>${esc(p.slice(2, -2))}</strong>`;
        }
        return esc(p).replace(/\b(\d+(?:[.,]\d+)?)\b/g, '<strong>$1</strong>');
      }).join('');
    }

    function renderLine(line) {
      const t = line.trim();
      if (!t) return '';
      return `<div class="wod-line">${applyBold(t)}</div>`;
    }

    /* ─── Leer negritas del portapapeles ─── */
    function htmlToText(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const buf = [];

      function isBold(node) {
        const tag = node.tagName.toLowerCase();
        if (tag === 'b' || tag === 'strong') return true;
        const fw = (node.getAttribute('style') || '').match(/font-weight\s*:\s*(\w+)/);
        if (fw) return fw[1] === 'bold' || parseInt(fw[1]) >= 700;
        return false;
      }

      function walk(node, bold) {
        if (node.nodeType === 3) {
          const t = node.textContent;
          if (!t) return;
          // Nodo de texto: si está en negrita y tiene contenido real, añadir marcadores **
          buf.push((bold && t.trim()) ? `**${t.trim()}**` : t);
          return;
        }
        if (node.nodeType !== 1) return;
        const tag = node.tagName.toLowerCase();
        if (tag === 'script' || tag === 'style') return;
        if (tag === 'br') { buf.push('\n'); return; }

        const b = bold || isBold(node);
        for (const child of node.childNodes) walk(child, b);

        // Siempre añadir salto de línea tras elemento de bloque —
        // incluyendo divs vacíos que actúan de separador de sección
        if (['p','div','li','h1','h2','h3','h4','h5','h6','tr'].includes(tag)) {
          buf.push('\n');
        }
      }

      walk(doc.body, false);

      return buf.join('')
        .replace(/\*\*\s*\*\*/g, '')     // marcadores vacíos
        .replace(/[ \t]{2,}/g, ' ')      // espacios múltiples
        .replace(/\n{3,}/g, '\n\n')      // máximo una línea en blanco
        .trim();
    }

    /* ─── Detección de bloques ─── */
    // Regla única: línea en blanco = nueva columna
    function splitBlocks(raw) {
      const blocks = [];
      let cur = [];
      for (const ln of raw.split(/\r?\n/)) {
        if (!ln.trim()) {
          if (cur.length) { blocks.push(cur); cur = []; }
        } else {
          cur.push(ln.trim());
        }
      }
      if (cur.length) blocks.push(cur);
      return blocks.length ? blocks : [[]];
    }

    /* ─── Número de columnas según secciones ───
       1 → 1 col
       2 → 2 col
       3 → 3 col
       4 → 2 col × 2 filas  (2×2, toda la pantalla)
       5-6 → 3 col × 2 filas
       7+ → 3 col
    ─── */
    function getColCount(n) {
      if (n <= 3) return n;
      if (n === 4) return 2;
      return 3;
    }

    /* ─── Render de tarjeta ─── */
    function renderCard(block) {
      const first = block[0] || '';
      const isNum = /^\d+[\)\.]\s*/.test(first);
      const body  = block.slice(1).map(renderLine).join('');

      if (isNum) {
        return `<div class="wod-card"><div class="card-num">${esc(first)}</div>${body}</div>`;
      } else {
        return `<div class="wod-card"><div class="card-title">${applyBold(first)}</div>${body}</div>`;
      }
    }

    /* ─── Parseo y render ─── */
    function renderWOD(raw) {
      if (!raw.trim()) return;
      let blocks = splitBlocks(raw);

      document.getElementById('wod-header').innerHTML = '';

      const grid = document.getElementById('wod-grid');
      const cols = getColCount(blocks.length);
      const rows = Math.ceil(blocks.length / cols);
      // Filas y columnas con tamaño fijo (1fr) — cada tarjeta ocupa
      // siempre toda su celda, sin importar cuánto contenido tenga.
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
      grid.innerHTML = blocks.map(b => renderCard(b)).join('');
    }

    /* ─── Auto-escalado ───
       El grid tiene filas/columnas de tamaño fijo (1fr), así que cada
       tarjeta ocupa siempre toda su celda. El font-size es ÚNICO para
       todo el grid (misma tipografía en todas las columnas) — se busca
       el mayor tamaño que quepa en TODAS las tarjetas a la vez.
       Dentro de cada tarjeta, las líneas se reparten verticalmente
       (justify-content: space-evenly) para aprovechar el alto de su celda.
    ─── */
    function scaleWOD() {
      const content = document.getElementById('wod-content');
      const grid    = document.getElementById('wod-grid');
      const display = document.getElementById('screen-display');

      if (display.style.display === 'none') return;

      const maxH = content.clientHeight;
      const maxW = content.clientWidth;
      if (maxH < 50 || maxW < 100) {
        setTimeout(scaleWOD, 100);
        return;
      }

      grid.style.height = maxH + 'px';

      const cards = grid.querySelectorAll('.wod-card');
      let lo = 4, hi = 400;
      while (hi - lo > 1) {
        const mid = (lo + hi) >> 1;
        grid.style.fontSize = mid + 'px';
        const overflow = Array.from(cards).some(c =>
          c.scrollHeight > c.clientHeight + 1 || c.scrollWidth > c.clientWidth + 1);
        if (overflow) hi = mid; else lo = mid;
      }
      grid.style.fontSize = lo + 'px';
    }

    /* ─── Control de pantallas ─── */

    // Al entrar en pantalla completa en móvil, forzamos horizontal si el
    // navegador lo permite (Android/Chrome). Esto es clave al castear/
    // reflejar la pantalla a una TV real: si el teléfono se queda en
    // vertical, la TV recibe una imagen vertical y la "pillarboxea"
    // (barras negras a los lados) en vez de aprovechar toda la pantalla.
    // En iOS no existe esta API, así que ahí se queda con el preview
    // "letterboxed" en proporción 16:9 (#tv-frame) como mejor alternativa.
    function tryLockLandscape() {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
    }

    function showDisplay() {
      const raw = document.getElementById('wod-input').value;
      if (!raw.trim()) return;

      sendToTV(raw);
      history.replaceState(null, '', '#wod=' + encodeWOD(raw));
      renderWOD(raw);
      document.getElementById('screen-editor').style.display = 'none';
      document.getElementById('screen-display').style.display = 'flex';

      // Escalar después de que el layout esté listo
      setTimeout(scaleWOD, 100);

      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen()
          .then(() => { tryLockLandscape(); setTimeout(scaleWOD, 200); })
          .catch(() => {});
      } else {
        tryLockLandscape();
      }
    }

    function goBack() {
      history.replaceState(null, '', location.pathname);
      document.getElementById('screen-display').style.display = 'none';
      document.getElementById('screen-editor').style.display  = 'flex';
      if (document.fullscreenElement) document.exitFullscreen();
      if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen()
          .then(() => { tryLockLandscape(); setTimeout(scaleWOD, 200); })
          .catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }

    /* ─── Compartir URL (solo en HTTP) ─── */
    if (location.protocol === 'http:' || location.protocol === 'https:') {
      const btnShare = document.getElementById('btn-share');
      btnShare.style.display = '';
      btnShare.addEventListener('click', () => {
        navigator.clipboard.writeText(location.href).then(() => {
          const orig = btnShare.textContent;
          btnShare.textContent = '✓ Copiado';
          setTimeout(() => { btnShare.textContent = orig; }, 2000);
        });
      });
    }

    /* ─── Chromecast ─── */
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isStandalone = window.navigator.standalone === true;

    function castStep(n, html) {
      return '<div class="cast-step"><div class="cast-n">' + n + '</div><div class="cast-text">' + html + '</div></div>';
    }

    function buildCastInstructions() {
      const stepsEl = document.getElementById('cast-steps');
      const noteEl  = document.getElementById('cast-note');

      const shareBox = `
        <div class="cast-share-box">
          <div class="cast-share-label">Enviar WOD a la Samsung TV</div>
          <button id="btn-share-wod" onclick="shareWODLink()">📤 Compartir enlace del WOD</button>
          <div class="cast-share-sub">Mándatelo por WhatsApp → ábrelo en la Samsung TV desde WhatsApp Web → el WOD aparece solo en la TV, el móvil queda libre</div>
        </div>`;

      if (isIOS) {
        stepsEl.innerHTML = shareBox +
          castStep(1, '<strong>AirPlay (alternativa)</strong>: gira el móvil a horizontal → Centro de Control → "Duplicar pantalla" → elige tu Samsung TV. El móvil debe quedarse en la app.') +
          castStep(2, '<strong>Cable HDMI</strong>: adaptador Lightning o USB-C a HDMI.');
        noteEl.innerHTML = '';
      } else {
        stepsEl.innerHTML = shareBox +
          castStep(1, 'Desliza desde arriba para abrir los <strong>ajustes rápidos</strong> del móvil') +
          castStep(2, 'Toca <strong>"Transmitir pantalla" / "Smart View"</strong> (el nombre varía según el móvil)') +
          castStep(3, 'Elige tu <strong>Chromecast / TV</strong> en la lista') +
          castStep(4, 'No toques el menú de Chrome durante la transmisión — así el móvil se queda en pantalla completa y horizontal');
        noteEl.innerHTML = '¿No tienes esa opción? Usa el menú ⋮ de Chrome → "Transmitir…", pero ten en cuenta que el navegador puede salir de pantalla completa y mostrar una barra blanca arriba mientras dure la transmisión.';
      }
    }

    function openCastModal() {
      buildCastInstructions();
      document.getElementById('cast-modal').style.display = 'flex';
    }
    function closeCastModal() {
      document.getElementById('cast-modal').style.display = 'none';
    }

    function startCast() {
      // 1. Mostrar el WOD en display
      showDisplay();

      // 2. Intentar Presentation API (abre el diálogo nativo de Chrome si está disponible)
      //    Funciona en HTTP/HTTPS; en file:// puede abrir la UI de transmitir pestaña
      if (window.PresentationRequest) {
        const req = new PresentationRequest([window.location.href]);
        req.start().catch(() => {}); // error silencioso = usuario canceló o no disponible
      }

      // 3. Mostrar las instrucciones paso a paso
      setTimeout(openCastModal, 350);
    }

    /* ─── Eventos ─── */
    document.getElementById('btn-choice-tv').addEventListener('click', () => {
      history.replaceState(null, '', '#tv');
      startTVMode();
    });
    document.getElementById('btn-choice-phone').addEventListener('click', () => {
      document.getElementById('screen-choice').style.display = 'none';
      document.getElementById('screen-editor').style.display = 'flex';
    });
    document.getElementById('btn-show').addEventListener('click', showDisplay);
    document.getElementById('btn-tv-mode').addEventListener('click', () => {
      history.replaceState(null, '', '#tv');
      startTVMode();
    });
    document.getElementById('btn-cast').addEventListener('click', startCast);
    document.getElementById('btn-cast-close').addEventListener('click', closeCastModal);
    document.getElementById('cast-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeCastModal();
    });

    // Interceptar paste para preservar negritas del portapapeles
    document.getElementById('wod-input').addEventListener('paste', function(e) {
      const html = e.clipboardData.getData('text/html');
      if (!html) return; // sin HTML → paste normal de texto plano
      e.preventDefault();
      const text = htmlToText(html);
      const ta = this;
      const s = ta.selectionStart, end = ta.selectionEnd;
      ta.value = ta.value.slice(0, s) + text + ta.value.slice(end);
      ta.selectionStart = ta.selectionEnd = s + text.length;
    });
    document.getElementById('btn-back').addEventListener('click', goBack);
    document.getElementById('btn-fs').addEventListener('click', toggleFullscreen);

    document.addEventListener('keydown', e => {
      const onDisplay = document.getElementById('screen-display').style.display !== 'none';
      if (!onDisplay) return;
      if (e.key === 'f' || e.key === 'F') toggleFullscreen();
      else if (e.key === 'c' || e.key === 'C') openCastModal();
      else if (e.key === 'Escape') {
        if (document.getElementById('cast-modal').style.display !== 'none') closeCastModal();
        else if (!document.fullscreenElement) goBack();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement && screen.orientation && screen.orientation.unlock) {
        screen.orientation.unlock();
      }
      const inFS = !!document.fullscreenElement;
      const fsDisplay = document.getElementById('btn-fs-display');
      const fsTv = document.getElementById('btn-tv-fs');
      if (fsDisplay) fsDisplay.style.display = inFS ? 'none' : '';
      if (fsTv) fsTv.style.display = inFS ? 'none' : '';
      setTimeout(scaleWOD, 200);
    });

    function shareWODLink() {
      const raw = document.getElementById('wod-input').value;
      if (!raw.trim()) return;
      const url = wodURL(raw);
      if (navigator.share) {
        navigator.share({ url, title: 'WOD del día' }).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => {
          const btn = document.getElementById('btn-share-wod');
          if (!btn) return;
          const orig = btn.textContent;
          btn.textContent = '✓ Enlace copiado';
          setTimeout(() => { btn.textContent = orig; }, 2500);
        }).catch(() => {});
      }
    }

    /* ─── Arranque según URL hash ─── */
    (function() {
      document.getElementById('choice-logo').src = document.getElementById('brand-logo').src;
      const h = location.hash;
      if (h === '#tv') {
        startTVMode();
      } else if (h === '#send') {
        document.getElementById('screen-choice').style.display = 'none';
        startSendMode();
      } else if (h.startsWith('#wod=')) {
        document.getElementById('screen-choice').style.display = 'none';
        const wod = decodeWOD(h.slice(5));
        if (wod) {
          document.getElementById('wod-input').value = wod;
          setTimeout(showDisplay, 80);
        }
      }
      // Sin hash → queda la pantalla de elección (visible por defecto)
    })();

    let rsTimer;
    window.addEventListener('resize', () => {
      clearTimeout(rsTimer);
      rsTimer = setTimeout(scaleWOD, 150);
    });
    window.addEventListener('orientationchange', () => setTimeout(scaleWOD, 150));
  </script>
</body>
</html>
